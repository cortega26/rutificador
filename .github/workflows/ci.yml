name: Integracion continua

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.python-version == '3.14' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - name: Obtener codigo (checkout)
      uses: actions/checkout@v6

    - name: Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: ${{ matrix.python-version == '3.14' }}

    - name: Cache de dependencias (pip)
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Instalar rutificador
      run: |
        pip install -e .

    - name: Ejecutar tests con cobertura
      run: |
        python -m pytest --cov=rutificador --cov-report=xml --cov-report=lcov --cov-report=html -v tests/ --tb=short

    - name: Detectar deprecaciones (todos los tests)
      run: |
        python -m pytest -q -W error::DeprecationWarning --tb=short tests/

    - name: Subir cobertura a Coveralls
      if: matrix.python-version != '3.14'
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: ./coverage.lcov
        flag-name: python-${{ matrix.python-version }}
        parallel: true

    - name: Generar reporte de cobertura
      run: |
        coverage report --show-missing
