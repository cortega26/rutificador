name: Integracion continua

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.python-version == '3.14' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v7

    - name: Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: ${{ matrix.python-version == '3.14' }}
        cache: pip
        cache-dependency-path: requirements-dev.txt

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Instalar rutificador
      run: |
        pip install -e .

    - name: Ejecutar tests (cobertura + deteccion de deprecaciones)
      run: |
        python -m pytest -W error::DeprecationWarning \
          --cov=rutificador --cov-report=xml --cov-report=lcov --cov-report=html \
          -v tests/ --tb=short

    - name: Subir cobertura a Coveralls
      if: matrix.python-version != '3.14'
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: ./coverage.lcov
        flag-name: python-${{ matrix.python-version }}
        parallel: true

    - name: Generar reporte de cobertura
      run: |
        coverage report --show-missing

  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Configurar Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
        cache: pip
        cache-dependency-path: requirements-dev.txt

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Instalar rutificador
      run: |
        pip install -e .

    - name: Formato (ruff)
      run: |
        python -m ruff format .
        git diff --exit-code

    - name: Lint (ruff)
      run: |
        python -m ruff check .

    - name: Tipos (mypy)
      run: |
        python -m mypy --strict rutificador/errores.py rutificador/version.py rutificador/config.py rutificador/utils.py rutificador/validador.py
        python -m mypy rutificador/ --ignore-missing-imports

    - name: Coherencia de dependencias (deptry)
      run: |
        deptry rutificador

    - name: Limites arquitectonicos (import-linter)
      run: |
        lint-imports

    - name: Validar configuracion de pre-commit
      run: |
        pre-commit validate-config
