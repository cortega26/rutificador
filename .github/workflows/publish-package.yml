name: Publicar paquete de Python en PyPI

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version a publicar (dejar vacio para detectar de pyproject.toml)"
        required: false
        default: ""

jobs:
  detect-version:
    name: Detectar cambio de version
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Detectar si la version cambio
        id: check
        run: |
          # Extraer version actual de pyproject.toml
          VERSION=$(grep -Po '(?<=^version = ")[^"]+' pyproject.toml)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Si es un tag manual, siempre publicar
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Tag detectado: ${{ github.ref }}. Publicando version ${VERSION}."
            exit 0
          fi

          # Si es workflow_dispatch con version explicita, siempre publicar
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Workflow manual. Publicando version ${VERSION}."
            exit 0
          fi

          # Si es release publicado, siempre publicar
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Release publicada. Publicando version ${VERSION}."
            exit 0
          fi

          # En push a master: verificar si pyproject.toml cambio vs commit anterior
          git diff HEAD~1 -- pyproject.toml | grep -q '^\+version' && CHANGED=true || CHANGED=false

          if [[ "$CHANGED" == "true" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version cambiada a ${VERSION}. Publicando."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Sin cambio de version. Omitiendo publicacion."
          fi

  publish:
    name: Subir publicacion a PyPI
    needs: detect-version
    if: needs.detect-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/rutificador
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verificar que la version no existe en PyPI
        id: pypi-check
        continue-on-error: true
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          pip install rutificador=="${VERSION}" --dry-run 2>&1 && {
            echo "ERROR: Version ${VERSION} ya existe en PyPI. Abortando."
            exit 1
          } || echo "Version ${VERSION} no existe en PyPI. Continuando."

      - name: Construir paquete
        run: python -m build

      - name: Generar attestacion de procedencia
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Generar SBOM CycloneDX
        run: |
          python -m pip install cyclonedx-bom
          cyclonedx-py environment -o sbom.json

      - name: Verificar paquete
        run: |
          python -m twine check dist/*

      - name: Publicar en PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.pypi.org/legacy/
          verbose: true
          print-hash: true

      - name: Crear tag y GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          TAG="v${VERSION}"

          # Crear tag si no existe
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
            echo "Tag ${TAG} creado."
          else
            echo "Tag ${TAG} ya existe."
          fi

          # Crear GitHub Release
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" dist/* \
              --title "v${VERSION}" \
              --notes "Release automatico de rutificador v${VERSION}. Ver [CHANGELOG.md](https://github.com/cortega26/rutificador/blob/master/CHANGELOG.md) para detalles."
            echo "Release ${TAG} creado."
          else
            echo "Release ${TAG} ya existe."
          fi

      - name: Adjuntar SBOM al release
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ needs.detect-version.outputs.version }}"
          gh release upload "$TAG" sbom.json --clobber
