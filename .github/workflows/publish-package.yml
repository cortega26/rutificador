name: Publicar paquete de Python en PyPI

on:
  push:
    tags:
      - "v*" # Publicar solo en tags de version
  release:
    types: [published]
  workflow_dispatch:
    inputs: {}
    branches: [master]

jobs:
  pypi-publish:
    name: Subir publicacion a PyPI
    runs-on: ubuntu-latest
    # Agregar un environment especifico para mayor seguridad
    environment:
      name: release
      url: https://pypi.org/p/rutificador
    permissions:
      id-token: write # IMPORTANTE: este permiso es obligatorio para trusted publishing
      contents: write # Requerido para gh release upload (adjuntar SBOM)
      attestations: write # Requerido para actions/attest-build-provenance

    # Ejecutar solo en tags o releases para evitar publicaciones accidentales
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Obtener codigo (checkout)
        uses: actions/checkout@v7

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Construir paquete
        run: python -m build

      - name: Generar attestacion de procedencia
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Generar SBOM CycloneDX
        run: |
          python -m pip install cyclonedx-bom
          cyclonedx-py environment -o sbom.json

      - name: Verificar paquete
        run: |
          python -m twine check dist/*

      - name: Publicar en PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Usar trusted publishing: no se requieren tokens de API
          # El repositorio debe configurarse en PyPI con GitHub como trusted publisher
          repository-url: https://upload.pypi.org/legacy/
          verbose: true
          print-hash: true

      - name: Adjuntar SBOM al release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${GITHUB_REF#refs/tags/} sbom.json
