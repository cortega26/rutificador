name: Escaneo de seguridad

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 2 * * 1'

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade "pip>=25.2"
          pip install -r requirements-dev.txt
          pip install -e .
          pip install bandit safety pip-audit

      - name: Linter de seguridad (Bandit)
        run: |
          bandit -r rutificador/ --severity-level medium --confidence-level medium

      - name: Auditoria de vulnerabilidades (pip-audit)
        run: |
          pip-audit --format json --output audit-report.json --desc --progress-spinner off

      - name: Safety check
        run: |
          safety check

      - name: Generar SBOM CycloneDX
        run: |
          cyclonedx-py environment "$(which python)" \
            --output-reproducible \
            --output-format JSON \
            --output-file sbom.json

      - name: Subir reportes
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports
          path: |
            audit-report.json
            sbom.json

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v7

    - name: Revision de dependencias
      uses: actions/dependency-review-action@v5
      with:
        fail-on-severity: moderate
